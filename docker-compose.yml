version: "3.8"

services:

  # ── Base de datos ─────────────────────────────────────────
  mariadb:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-gestor_correo}
      MYSQL_USER: ${DB_USERNAME:-gestor_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Backend Laravel ───────────────────────────────────────
  laravel:
    build:
      context: ./laravel-backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APP_NAME: "Gestor Correo"
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${APP_KEY}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-http://localhost}
      DB_CONNECTION: mysql
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-gestor_correo}
      DB_USERNAME: ${DB_USERNAME:-gestor_user}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-changeme32charskey000000000000}
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      SESSION_DRIVER: database
    depends_on:
      mariadb:
        condition: service_healthy
    volumes:
      - laravel_storage:/var/www/html/storage/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ── Frontend React ────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${APP_URL:-http://localhost}
    restart: unless-stopped
    depends_on:
      - laravel

  # ── phpMyAdmin (opcional, para gestionar la BD) ───────────
  phpmyadmin:
    image: phpmyadmin:latest
    restart: unless-stopped
    environment:
      PMA_HOST: mariadb
      PMA_USER: ${DB_USERNAME:-gestor_user}
      PMA_PASSWORD: ${DB_PASSWORD:-secret}
    depends_on:
      - mariadb

volumes:
  mariadb_data:
  laravel_storage:
